<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XJ陪玩注册</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:white;
  padding:25px;
  border-radius:15px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
}
button{
  width:100%;
  padding:10px;
  background:#333;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>
<div class="card">
<h2>XJ陪玩注册</h2>

<input id="name" placeholder="姓名">
<select id="gender">
  <option>男</option>
  <option>女</option>
</select>
<input id="age" type="number" placeholder="年龄">
<input id="game" placeholder="陪玩游戏（如王者/原神）">
<input id="rank" placeholder="游戏段位">

<button onclick="register()">提交注册</button>
</div>

<script type="module">
import { supabase } from './supabase.js';

window.register = async function(){
  const { error } = await supabase.from('players').insert([
    {
      name: name.value,
      gender: gender.value,
      age: age.value,
      game: game.value,
      rank: rank.value
    }
  ]);

  if(error){
    alert("注册失败：" + error.message);
  }else{
    alert("注册成功！");
  }
}
</script>

</body>
</html>
